<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Xauron — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
:root{--bg:#0a0c10;--bg2:#111318;--bg3:#181c24;--b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--t:#e8eaf0;--t2:#7a8099;--t3:#4a5068;--g:#00e896;--gb:rgba(0,232,150,.08);--gbd:rgba(0,232,150,.25);--r:#ff4d6a;--rb:rgba(255,77,106,.08);--rbd:rgba(255,77,106,.25);--gold:#ffd700;--goldb:rgba(255,215,0,.1);--goldbd:rgba(255,215,0,.3);--mono:'DM Mono',monospace;--font:'Syne',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.013) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.013) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:400px}
.card{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:32px;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center}
.logo-ico{width:38px;height:38px;background:linear-gradient(135deg,#ffd700,#00e896);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000}
.logo-name{font-size:20px;font-weight:700}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:3px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:22px}
.tab{padding:8px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;border:none;background:transparent;color:var(--t2);font-family:var(--font)}
.tab.active{background:var(--bg2);color:var(--t);border:1px solid var(--b2)}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:10px 13px;color:var(--t);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--goldbd)}
.field input::placeholder{color:var(--t3)}
.btn-main{width:100%;padding:12px;border-radius:8px;border:none;background:linear-gradient(135deg,#ffd700,#00e896);color:#000;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-main:hover{opacity:.9}
.btn-main:disabled{opacity:.6;cursor:not-allowed}
.msg{padding:10px 13px;border-radius:7px;font-family:var(--mono);font-size:11px;margin-bottom:12px;display:none;line-height:1.5}
.msg.err{background:var(--rb);border:1px solid var(--rbd);color:var(--r);display:block}
.msg.ok{background:var(--gb);border:1px solid var(--gbd);color:var(--g);display:block}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b)}
.divider span{font-family:var(--mono);font-size:10px;color:var(--t3)}
.btn-google{width:100%;padding:10px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--t);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;font-family:var(--font)}
.btn-google:hover{background:rgba(255,255,255,.04)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-note{font-family:var(--mono);font-size:9px;color:var(--t3);text-align:center;line-height:1.7}
.footer-note a{color:var(--t2);text-decoration:none}
.loading-screen{text-align:center;padding:40px;display:none}
.loading-screen.show{display:block}
.loading-screen .spin2{display:inline-block;width:32px;height:32px;border:3px solid var(--b2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
.loading-screen p{font-family:var(--mono);font-size:11px;color:var(--t2)}
</style>
</head>
<body>
<div class="wrap">

  <!-- Loading -->
  <div class="loading-screen" id="loading-screen">
    <div class="spin2"></div>
    <p id="loading-msg">Verificando sessão...</p>
  </div>

  <!-- Login Card -->
  <div id="login-card" class="card" style="display:none">
    <div class="logo">
      <div class="logo-ico">⚡</div>
      <span class="logo-name">IA Xauron</span>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Criar conta</button>
    </div>
    <div id="msg" class="msg"></div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="field"><label>Senha</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-main" id="btn-login" onclick="doLogin()">Entrar na plataforma →</button>
      <div style="text-align:right;margin-top:8px"><a href="#" style="font-family:var(--mono);font-size:10px;color:var(--t2)" onclick="switchTab('reset');return false">Esqueci minha senha</a></div>
    </div>

    <!-- SIGNUP -->
    <div id="form-signup" style="display:none">
      <div class="field"><label>Nome</label><input type="text" id="s-name" placeholder="Seu nome"></div>
      <div class="field"><label>Email</label><input type="email" id="s-email" placeholder="seu@email.com"></div>
      <div class="field"><label>Senha (mín. 6 caracteres)</label><input type="password" id="s-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSignup()"></div>
      <button class="btn-main" id="btn-signup" onclick="doSignup()">Criar conta grátis →</button>
      <div class="divider"><span>ou</span></div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Cadastrar com Google
      </button>
    </div>

    <!-- RESET -->
    <div id="form-reset" style="display:none">
      <p style="font-size:13px;color:var(--t2);margin-bottom:16px">Enviaremos um link para redefinir sua senha.</p>
      <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="seu@email.com"></div>
      <button class="btn-main" onclick="doReset()">Enviar link →</button>
      <div style="text-align:center;margin-top:10px"><a href="#" style="font-family:var(--mono);font-size:10px;color:var(--t2)" onclick="switchTab('login');return false">← Voltar</a></div>
    </div>
  </div>

  <div class="footer-note" id="footer-note" style="display:none">
    Ao criar conta você concorda com os <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a><br>
    © 2025 IA Xauron
  </div>
</div>

<script>
const SURL = 'https://dlgzpgqnadlqvmaymzep.supabase.co';
const SKEY = 'sb_publishable_w9p6kuomsL6uNteFLiA-Ow_TE0QBoz9';
let sb = null;

function showLoading(msg) {
  document.getElementById('loading-screen').className = 'loading-screen show';
  document.getElementById('loading-msg').textContent = msg || 'Carregando...';
  document.getElementById('login-card').style.display = 'none';
  document.getElementById('footer-note').style.display = 'none';
}

function showLogin() {
  document.getElementById('loading-screen').className = 'loading-screen';
  document.getElementById('login-card').style.display = 'block';
  document.getElementById('footer-note').style.display = 'block';
}

window.addEventListener('DOMContentLoaded', async () => {
  showLoading('Verificando sessão...');
  try {
    sb = window.supabase.createClient(SURL, SKEY);
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      // Já logado — vai direto para o dashboard
      showLoading('Redirecionando...');
      window.location.href = 'dashboard.html';
    } else {
      showLogin();
    }
  } catch(e) {
    console.error(e);
    showLogin();
    showMsg('Erro ao conectar com o servidor.', 'err');
  }
});

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  if (!email || !pass) { showMsg('Preencha email e senha.', 'err'); return; }
  setBtn('btn-login', true);
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      showMsg(tradErr(error.message), 'err');
      setBtn('btn-login', false);
    } else {
      showLoading('Login realizado! Abrindo plataforma...');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
    }
  } catch(e) {
    showMsg('Erro de conexão. Tente novamente.', 'err');
    setBtn('btn-login', false);
  }
}

async function doSignup() {
  const name  = document.getElementById('s-name').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const pass  = document.getElementById('s-pass').value;
  if (!name || !email || !pass) { showMsg('Preencha todos os campos.', 'err'); return; }
  if (pass.length < 6) { showMsg('Senha mínimo 6 caracteres.', 'err'); return; }
  setBtn('btn-signup', true);
  try {
    const { data, error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
    if (error) {
      showMsg(tradErr(error.message), 'err');
      setBtn('btn-signup', false);
    } else {
      showMsg('✅ Conta criada! Fazendo login...', 'ok');
      setTimeout(async () => {
        const { error: e2 } = await sb.auth.signInWithPassword({ email, password: pass });
        if (!e2) {
          showLoading('Abrindo plataforma...');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
        } else {
          setBtn('btn-signup', false);
          switchTab('login');
          document.getElementById('l-email').value = email;
        }
      }, 1000);
    }
  } catch(e) {
    showMsg('Erro de conexão. Tente novamente.', 'err');
    setBtn('btn-signup', false);
  }
}

async function doGoogle() {
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/dashboard.html' } });
}

async function doReset() {
  const email = document.getElementById('r-email').value.trim();
  if (!email) { showMsg('Informe seu email.', 'err'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if (error) showMsg(tradErr(error.message), 'err');
  else showMsg('Link enviado! Verifique seu email.', 'ok');
}

function switchTab(tab) {
  ['login','signup','reset'].forEach(t => {
    document.getElementById('form-'+t).style.display = t===tab?'block':'none';
    const el = document.getElementById('tab-'+t);
    if(el) el.className = 'tab'+(t===tab?' active':'');
  });
  document.getElementById('msg').className='msg';
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

function setBtn(id, loading) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = loading;
  const labels = { 'btn-login': 'Entrar na plataforma →', 'btn-signup': 'Criar conta grátis →' };
  btn.innerHTML = loading ? '<span class="spin"></span> Aguarde...' : labels[id];
}

function tradErr(msg) {
  const map = {
    'Invalid login credentials': 'Email ou senha incorretos.',
    'Email not confirmed': 'Confirme seu email antes de entrar.',
    'User already registered': 'Email já cadastrado. Faça login.',
    'Password should be at least 6 characters': 'Senha mínima: 6 caracteres.',
    'Email rate limit exceeded': 'Muitas tentativas. Aguarde alguns minutos.',
  };
  return map[msg] || msg;
}
</script>
</body>
</html>
